<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style A: Bold Signal</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #1a1a1a;
            --bg-gradient: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
            --card-bg: #FF5722;
            --text-primary: #ffffff;
            --text-on-card: #1a1a1a;
            --accent: #FF5722;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .slide {
            width: 100%;
            height: 100vh;
            padding: clamp(2rem, 8vw, 6rem);
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: end;
            position: relative;
        }

        .number {
            position: absolute;
            top: clamp(2rem, 5vw, 4rem);
            left: clamp(2rem, 5vw, 4rem);
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: var(--accent);
            opacity: 0.8;
        }

        .nav {
            position: absolute;
            top: clamp(2rem, 5vw, 4rem);
            right: clamp(2rem, 5vw, 4rem);
            display: flex;
            gap: 1rem;
        }

        .nav-item {
            width: 40px;
            height: 2px;
            background: var(--text-primary);
            opacity: 0.2;
        }

        .nav-item.active {
            opacity: 1;
            background: var(--accent);
        }

        .card {
            grid-column: 1 / span 2;
            background: var(--card-bg);
            color: var(--text-on-card);
            padding: clamp(2rem, 5vw, 4rem);
            transform: translateY(20%);
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .title {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 0.9;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .subtitle {
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            font-weight: 500;
            max-width: 600px;
        }

        @keyframes slideUp {
            to { transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="number">01</div>
        <div class="nav">
            <div class="nav-item active"></div>
            <div class="nav-item"></div>
            <div class="nav-item"></div>
        </div>
        <div class="card">
            <h1 class="title">Nomad<br>Eagle</h1>
            <p class="subtitle">Sovereign Financial Intelligence for the Modern Household.</p>
        </div>
    </div>
</body>
</html>
